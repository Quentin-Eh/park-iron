<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
::-webkit-scrollbar{display:none}
html,body{margin:0;padding:0;background:#0d0d1a;color:#fff;font-family:'Inter',-apple-system,sans-serif;
  overscroll-behavior:none;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:100dvh}
body{padding-bottom:env(safe-area-inset-bottom,0)}
button{font-family:inherit}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:40px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .3s ease both}
.slide-up{animation:slideUp .3s ease both}
.pulse{animation:pulse 1s ease infinite}

/* Day cards */
.day-card{background:rgba(255,255,255,.03);border-radius:16px;padding:20px 18px;cursor:pointer;
  text-align:left;position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s;
  display:block;width:100%;border:none;color:#fff}
.day-card:active{transform:scale(.98)}
.day-card .bar{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:16px 0 0 16px}

/* Exercise card */
.ex-card{background:rgba(255,255,255,.03);border-radius:14px;padding:16px;
  border:1px solid rgba(255,255,255,.06)}

/* Timer ring */
.timer-wrap{display:flex;align-items:center;gap:12px;border-radius:12px;padding:10px 14px;
  border:1px solid rgba(255,255,255,.06);transition:all .3s}
.timer-wrap.active{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2)}
.timer-wrap.done{border-color:rgba(78,205,196,.3)}

/* Buttons */
.btn-primary{width:100%;padding:18px;border-radius:14px;border:none;color:#fff;
  font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:transform .1s}
.btn-primary:active{transform:scale(.97)}
.btn-sm{border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.btn-icon{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:16px;
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.5)}

/* Rep stepper */
.rep-stepper{display:flex;align-items:center;gap:8px}
.rep-stepper .label{font-size:12px;color:rgba(255,255,255,.4);min-width:28px}
.rep-stepper button{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.rep-stepper button:active{background:rgba(255,255,255,.1)}
.rep-stepper .val{font-family:'JetBrains Mono','SF Mono',monospace;font-size:20px;font-weight:700;
  min-width:32px;text-align:center}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:flex;align-items:flex-end;justify-content:center}
.overlay-center{align-items:center}
.drawer{background:#1a1a2e;border-radius:20px 20px 0 0;padding:24px 20px calc(40px + env(safe-area-inset-bottom,0));
  width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.drawer-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:0 auto 20px}

/* History tag */
.htag{background:rgba(255,255,255,.04);border-radius:6px;padding:3px 8px;font-size:11px;
  color:rgba(255,255,255,.45);font-family:'JetBrains Mono',monospace;display:inline-block}

/* Sticky header */
.sticky-hdr{position:sticky;top:0;z-index:50;background:#0d0d1a;padding:4px 0 12px;
  border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px}

/* Section label */
.sec-label{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;opacity:.8}
.sec-meta{font-size:11px;color:rgba(255,255,255,.25);font-weight:500}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4ECDC4;color:#0d0d1a;
  padding:10px 20px;border-radius:12px;font-weight:700;font-size:13px;z-index:200;
  animation:fadeIn .3s ease,fadeIn .3s ease 2s reverse both}

/* Progression item */
.prog-item{display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.prog-item:active{opacity:.7}

/* Resume modal */
.resume-modal{background:#1a1a2e;border-radius:20px;padding:28px 24px;width:calc(100% - 40px);max-width:400px}

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ════════════════════════════════════════════════════════════════
// PROGRAM SCHEMA (v1)
// This structure is the contract between program generation (AI)
// and the renderer. The app renders any valid program schema.
// ════════════════════════════════════════════════════════════════

const SCHEMA_VERSION = 1;

const DEFAULT_PROGRAM = {
  schemaVersion: SCHEMA_VERSION,
  version: "1.0.0",
  name: "Park Iron — Calisthenics Hypertrophy",
  description: "3-day full body, antagonist supersets, 35-45 min",
  days: {

            progression:["Diamond push-ups","Archer push-ups (partial)","Archer push-ups (full)","One-arm negatives"] },
          { id:"ring_rows", name:"Ring Rows", detail:"Feet elevated if possible", target:"6-12",
            progression:["Ring rows (feet on ground)","Ring rows (feet elevated)","Ring rows (slow 4s eccentric)","Front lever rows (tuck)"] },
        ]},
        { type:"superset", label:"Finisher", rounds:2, rest:60, exercises:[

            progression:["Ring face pulls (upright)","Ring face pulls (more horizontal)","Ring face pulls (slow eccentric)"] },
        ]},
        { type:"straight", label:"Legs", rounds:3, rest:120, exercises:[
          { id:"pistols_a", name:"Pistol Squats", detail:"Full depth, each leg", target:"6-8/leg",
            progression:["Bodyweight pistols","Slow eccentric (5s)","Weighted (backpack/stone)"] },
        ]},
      ],
    },
    B: {
      name: "Day B", subtitle: "Pull Emphasis + Push Maintenance", color: "#4ECDC4",
      sections: [
        { type:"superset", label:"Superset 1", rounds:3, rest:90, exercises:[
          { id:"chinups", name:"Chin-ups", detail:"Palms facing you — biceps focus", target:"6-12",
            progression:["Chin-ups (bodyweight)","Chin-ups (slow 4s eccentric)","Weighted chin-ups","One-arm chin-up negatives"] },
          { id:"ring_dips_b", name:"Ring Dips", detail:"Maintenance volume", target:"6-12",
            progression:["Ring dips (3s eccentric)","Ring dips (5s eccentric)","Ring dips w/ 2s pause","Weighted ring dips"] },
        ]},
        { type:"superset", label:"Superset 2", rounds:3, rest:90, exercises:[
          { id:"archer_pullups", name:"Archer Pull-ups", detail:"Or slow-tempo pull-ups if not ready", target:"4-8",
            progression:["Slow tempo pull-ups (5s down)","Archer pull-ups (partial shift)","Archer pull-ups (full)","One-arm negatives (5s+)"] },

        ]},
        { type:"straight", label:"Posterior Chain", rounds:3, rest:120, exercises:[
          { id:"nordics", name:"Nordic Curl Negatives", detail:"Lower as slowly as possible", target:"4-6",

        ]},
        { type:"straight", label:"Power", rounds:3, rest:90, exercises:[
          { id:"jump_squats", name:"Jump Squats", detail:"Explosive, full recovery", target:"8",
            progression:["Jump squats","Jump squats (deeper)","Weighted jump squats"] },
        ]},
        { type:"straight", label:"Core & Skills", rounds:3, rest:60, exercises:[
          { id:"vsit", name:"V-sit Hold", detail:"Max hold", target:"15-20s", isHold:true,
            progression:["L-sit (30s+)","V-sit (building to 20s)","V-sit (20s+)"] },
          { id:"planche_lean", name:"Pseudo-planche Lean", detail:"On parallettes, lean forward", target:"15-20s", isHold:true,
            progression:["Slight lean","Moderate lean (shoulders past wrists)","Deep lean","Tuck planche attempts"] },
          { id:"ring_support", name:"Ring Support Hold", detail:"Arms turned out (RTO)", target:"20-30s", isHold:true,
            progression:["Ring support (neutral)","Ring support (turned out 45°)","Ring support (full RTO)","Ring support + lean forward"] },
        ]},
      ],
    },
  },
};

// ════════════════════════════════════════════════════════════════
// DATASTORE
// Abstraction over localStorage. Same interface works with cloud.
// Separate keys: sessions, draft, progressions, program
// ════════════════════════════════════════════════════════════════

const DataStore = {
  _get(key) { try { return JSON.parse(localStorage.getItem(`pi-${key}`)); } catch { return null; } },
  _set(key, val) { try { localStorage.setItem(`pi-${key}`, JSON.stringify(val)); } catch {} },
  _del(key) { try { localStorage.removeItem(`pi-${key}`); } catch {} },

  // Sessions (completed workouts)
  getSessions()   { return this._get('sessions') || []; },
  saveSessions(s) { this._set('sessions', s); },

  // Draft (in-progress session, auto-saved)
  getDraft()      { return this._get('draft'); },
  saveDraft(d)    { this._set('draft', { ...d, savedAt: new Date().toISOString() }); },
  clearDraft()    { this._del('draft'); },

  // Progressions ({ exerciseId: levelIndex })
  getProgressions()   { return this._get('progressions') || {}; },
  saveProgressions(p) { this._set('progressions', p); },

  // Program (the full program schema)
  getProgram()   { return this._get('program') || DEFAULT_PROGRAM; },
  saveProgram(p) { this._set('program', p); },

  // Schema version for future migrations
  getVersion()   { return this._get('version') || 0; },
  setVersion(v)  { this._set('version', v); },

  // Export everything as a single backup blob
  exportAll() {
    return {
      exportVersion: 1,
      exportDate: new Date().toISOString(),
      sessions: this.getSessions(),
      progressions: this.getProgressions(),
      program: this.getProgram(),
    };
  },

  // Import from backup blob — merges or replaces
  importAll(blob) {
    if (!blob || typeof blob !== 'object') throw new Error('Invalid backup');
    // Support both old format (raw array) and new export format
    if (Array.isArray(blob)) {
      // Old-style export: just a sessions array
      this.saveSessions(blob);
      return;
    }
    if (blob.exportVersion) {
      if (blob.sessions) this.saveSessions(blob.sessions);
      if (blob.progressions) this.saveProgressions(blob.progressions);
      if (blob.program) this.saveProgram(blob.program);
      return;
    }
    throw new Error('Unrecognized backup format');
  },

  // Migrate from legacy pi-history format
  migrate() {
    const currentVersion = this.getVersion();
    if (currentVersion >= 1) return; // already migrated

    // Migrate old pi-history → new sessions key
    try {
      const raw = localStorage.getItem('pi-history');
      if (raw) {
        const oldHistory = JSON.parse(raw);
        if (Array.isArray(oldHistory) && oldHistory.length > 0) {
          // Only migrate if we don't already have sessions
          const existing = this.getSessions();
          if (existing.length === 0) {
            this.saveSessions(oldHistory);
          }
        }
      }
    } catch {}

    // Save default program
    if (!this._get('program')) {
      this.saveProgram(DEFAULT_PROGRAM);
    }

    this.setVersion(1);
  },
};

// Run migration on load
DataStore.migrate();

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════

const fmt = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const fmtDate = iso => new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

// Look up exercise name from program (for history display)
function findExerciseName(program, dayKey, exId) {
  const day = program.days[dayKey];
  if (!day) return exId;
  for (const sec of day.sections) {
    for (const ex of sec.exercises) {
      if (ex.id === exId) return ex.name;
    }
  }
  return exId;
}

// ════════════════════════════════════════════════════════════════
// COMPONENTS
// ════════════════════════════════════════════════════════════════

// ──── Rest Timer ────
function RestTimer({ duration, onComplete }) {
  const [rem, setRem] = useState(duration);
  const [on, setOn] = useState(false);
  const iv = useRef(null);
  const ctx = useRef(null);

  const beep = useCallback((freq=880) => {
    try {
      if (!ctx.current) ctx.current = new (window.AudioContext||window.webkitAudioContext)();
      const o = ctx.current.createOscillator(), g = ctx.current.createGain();
      o.connect(g); g.connect(ctx.current.destination);
      o.frequency.value = freq; g.gain.value = 0.3;
      o.start(); o.stop(ctx.current.currentTime + 0.15);
    } catch{}
  },[]);

  useEffect(() => {
    if (on && rem > 0) {
      iv.current = setInterval(() => {
        setRem(r => {
          if (r <= 1) { clearInterval(iv.current); setOn(false); beep(1200); onComplete?.(); return 0; }
          if (r === 4) beep(660);
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(iv.current);
  }, [on, rem, beep, onComplete]);

  const toggle = () => { if (rem===0){setRem(duration);setOn(true)} else setOn(!on) };
  const reset = () => { clearInterval(iv.current); setOn(false); setRem(duration) };
  const pct = ((duration-rem)/duration)*100;
  const low = rem<=5 && rem>0 && on;
  const done = rem===0 && !on;

  return (
    <div className={`timer-wrap ${on?'active':''} ${done?'done':''}`}>
      <div style={{position:'relative',width:48,height:48,flexShrink:0}}>
        <svg viewBox="0 0 48 48" style={{transform:'rotate(-90deg)'}}>
          <circle cx="24" cy="24" r="20" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="3"/>
          <circle cx="24" cy="24" r="20" fill="none" stroke={done?'#4ECDC4':on?'#FF6B35':'rgba(255,255,255,.2)'}
            strokeWidth="3" strokeDasharray={`${pct*1.2566} 125.66`} strokeLinecap="round"
            style={{transition:'stroke-dasharray .3s'}}/>
        </svg>
        <span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',
          fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
          color:low?'#FF6B35':done?'#4ECDC4':'#fff'}} className={low?'pulse':''}>
          {done?'GO!':fmt(rem)}
        </span>
      </div>
      <span style={{fontSize:13,color:'rgba(255,255,255,.4)',fontWeight:500}}>
        {done ? 'Rest complete' : `Rest ${duration}s`}
      </span>
      <div style={{marginLeft:'auto',display:'flex',gap:6}}>
        <button onClick={toggle} className="btn-sm" style={{
          background:done?'rgba(78,205,196,.15)':on?'rgba(255,107,53,.2)':'rgba(78,205,196,.15)',
          color:done?'#4ECDC4':on?'#FF6B35':'#4ECDC4'}}>
          {done?'RESET':on?'PAUSE':'START'}
        </button>
        {on && <button onClick={reset} className="btn-sm"
          style={{background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.4)'}}>✕</button>}
      </div>
    </div>
  );
}

// ──── Hold Timer (isometric exercises) ────
function HoldTimer() {
  const [elapsed, setElapsed] = useState(0);
  const [on, setOn] = useState(false);
  const iv = useRef(null);

  useEffect(() => {
    if (on) {
      iv.current = setInterval(() => setElapsed(e => e + 1), 1000);
    }
    return () => clearInterval(iv.current);
  }, [on]);

  const toggle = () => {
    if (on) { clearInterval(iv.current); setOn(false); }
    else { setElapsed(0); setOn(true); }
  };

  return (
    <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
      <button onClick={toggle} className="btn-sm" style={{
        background:on?'rgba(168,85,247,.2)':'rgba(168,85,247,.1)',
        color:'#A855F7',minWidth:60}}>
        {on ? 'STOP' : 'HOLD'}
      </button>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700,
        color:on?'#A855F7':'rgba(255,255,255,.5)',minWidth:50}}>
        {fmt(elapsed)}
      </span>
    </div>
  );
}

// ──── Rep Input ────
function RepInput({ value, onChange, label }) {
  return (
    <div className="rep-stepper">
      <span className="label">{label}</span>
      <button onClick={() => onChange(Math.max(0,(value||0)-1))}>−</button>
      <span className="val">{value||0}</span>
      <button onClick={() => onChange((value||0)+1)}>+</button>
    </div>
  );
}

// ──── Progression Drawer (interactive) ────
function ProgressionDrawer({ exercise, currentLevel, onSelectLevel, onClose }) {
  if (!exercise) return null;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="drawer slide-up" onClick={e=>e.stopPropagation()}>
        <div className="drawer-handle"/>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>{exercise.name}</h3>
        <p style={{color:'rgba(255,255,255,.4)',fontSize:13,marginBottom:20}}>Tap to set your current level</p>
        {exercise.progression.map((step,i) => {
          const isCurrent = i === currentLevel;
          return (
            <div key={i} className="prog-item" onClick={() => onSelectLevel(i)}
              style={{borderBottom:i<exercise.progression.length-1?'1px solid rgba(255,255,255,.06)':'none'}}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',
                justifyContent:'center',flexShrink:0,fontSize:12,fontWeight:700,
                background:isCurrent?'rgba(78,205,196,.2)':'rgba(255,255,255,.05)',
                color:isCurrent?'#4ECDC4':'rgba(255,255,255,.3)'}}>
                {i+1}
              </div>
              <span style={{color:isCurrent?'#fff':'rgba(255,255,255,.5)',fontSize:14,
                fontWeight:isCurrent?600:400,flex:1}}>{step}</span>
              {isCurrent && <span style={{background:'rgba(78,205,196,.15)',color:'#4ECDC4',
                fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:6,letterSpacing:.5}}>CURRENT</span>}
            </div>
          );
        })}
        <p style={{marginTop:20,color:'rgba(255,255,255,.35)',fontSize:12,lineHeight:1.5}}>
          Progress when you hit the top of your rep range on all sets for 2 sessions in a row.
        </p>
      </div>
    </div>
  );
}

// ──── Exercise Card ────
function ExerciseCard({ exercise, totalRounds, reps, onRepsChange, dayColor, progressionLevel, onProgressionChange }) {
  const [showProg, setShowProg] = useState(false);
  const currentVariant = exercise.progression[progressionLevel] || exercise.progression[0];

  return (
    <>
      <div className="ex-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
          <div>
            <h4 style={{fontSize:16,fontWeight:700}}>{exercise.name}</h4>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:12,marginTop:2}}>{exercise.detail}</p>
          </div>
          <button onClick={()=>setShowProg(true)} className="btn-sm"
            style={{background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.5)',fontSize:11}}>
            ↑ Prog
          </button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:6,
            background:`${dayColor}15`,borderRadius:8,padding:'4px 10px'}}>
            <span style={{fontSize:11,color:dayColor,fontWeight:600}}>
              Target: {exercise.target} {exercise.isHold?'':'reps'}
            </span>
          </div>
          <div style={{display:'inline-flex',alignItems:'center',gap:4,
            background:'rgba(78,205,196,.08)',borderRadius:8,padding:'4px 10px'}}>
            <span style={{fontSize:11,color:'#4ECDC4',fontWeight:500}}>
              {currentVariant}
            </span>
          </div>
        </div>
        {exercise.isHold ? (
          <div>
            <HoldTimer/>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:10}}>
              {Array.from({length:totalRounds}).map((_,i)=>(
                <RepInput key={i} label={`S${i+1}`} value={reps[i]}
                  onChange={v=>{const n=[...reps];n[i]=v;onRepsChange(n)}}/>
              ))}
            </div>
            <p style={{fontSize:10,color:'rgba(255,255,255,.25)',marginTop:6}}>Log seconds held per set</p>
          </div>
        ) : (
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {Array.from({length:totalRounds}).map((_,i)=>(
              <RepInput key={i} label={`S${i+1}`} value={reps[i]}
                onChange={v=>{const n=[...reps];n[i]=v;onRepsChange(n)}}/>
            ))}
          </div>
        )}
      </div>
      {showProg && <ProgressionDrawer exercise={exercise} currentLevel={progressionLevel}
        onSelectLevel={(lvl) => { onProgressionChange(lvl); }}
        onClose={()=>setShowProg(false)}/>}
    </>
  );
}

// ──── Resume Prompt ────
function ResumePrompt({ draft, program, onResume, onDiscard }) {
  const day = program.days[draft.day];
  if (!day) { onDiscard(); return null; }
  const elapsed = Math.round((new Date(draft.savedAt).getTime() - new Date(draft.start).getTime()) / 60000);
  const repsLogged = Object.values(draft.data || {}).reduce((a,r) => a + r.reduce((b,v) => b+v, 0), 0);

  return (
    <div className="overlay overlay-center" onClick={onDiscard}>
      <div className="resume-modal slide-up" onClick={e=>e.stopPropagation()}>
        <h3 style={{fontSize:18,fontWeight:700,marginBottom:8}}>Resume session?</h3>
        <p style={{color:'rgba(255,255,255,.4)',fontSize:13,marginBottom:20,lineHeight:1.5}}>
          You have an unfinished <strong style={{color:day.color}}>{day.name}</strong> session.
        </p>
        <div style={{display:'flex',gap:12,marginBottom:20}}>
          <div style={{flex:1,background:'rgba(255,255,255,.04)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700}}>{repsLogged}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>reps logged</div>
          </div>
          <div style={{flex:1,background:'rgba(255,255,255,.04)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700}}>{elapsed}m</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.3)'}}>elapsed</div>
          </div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onDiscard} style={{flex:1,padding:14,borderRadius:12,border:'1px solid rgba(255,255,255,.1)',
            background:'transparent',color:'rgba(255,255,255,.5)',fontSize:14,fontWeight:700,cursor:'pointer'}}>
            Discard
          </button>
          <button onClick={onResume} style={{flex:1,padding:14,borderRadius:12,border:'none',
            background:`linear-gradient(135deg,${day.color},${day.color}aa)`,
            color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer'}}>
            Resume
          </button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════

function App() {
  const [screen, setScreen] = useState('home');
  const [activeDay, setActiveDay] = useState(null);
  const [sessionData, setSessionData] = useState({});
  const [sessionStart, setSessionStart] = useState(null);
  const [history, setHistory] = useState(() => DataStore.getSessions());
  const [progressions, setProgressions] = useState(() => DataStore.getProgressions());
  const [program] = useState(() => DataStore.getProgram());
  const [toast, setToast] = useState(null);
  const [pendingDraft, setPendingDraft] = useState(() => {
    const draft = DataStore.getDraft();
    if (!draft) return null;
    // Expire drafts older than 24 hours
    const age = Date.now() - new Date(draft.savedAt).getTime();
    if (age > 24 * 60 * 60 * 1000) { DataStore.clearDraft(); return null; }
    return draft;
  });
  const importRef = useRef(null);

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2500); };

  // ── Auto-save draft (debounced 2s) ──
  useEffect(() => {
    if (screen !== 'session' || !activeDay) return;
    const timer = setTimeout(() => {
      DataStore.saveDraft({
        day: activeDay,
        data: sessionData,
        start: sessionStart,
      });
    }, 2000);
    return () => clearTimeout(timer);
  }, [screen, activeDay, sessionData, sessionStart]);

  // ── Session management ──
  const startSession = day => {
    setActiveDay(day);
    setSessionData({});
    setSessionStart(new Date().toISOString());
    DataStore.clearDraft();
    setScreen('session');
  };

  const resumeSession = () => {
    if (!pendingDraft) return;
    setActiveDay(pendingDraft.day);
    setSessionData(pendingDraft.data || {});
    setSessionStart(pendingDraft.start);
    setPendingDraft(null);
    setScreen('session');
  };

  const discardDraft = () => {
    DataStore.clearDraft();
    setPendingDraft(null);
  };

  const getReps = (id, rounds) => sessionData[id] || new Array(rounds).fill(0);
  const setReps = (id, r) => setSessionData(d => ({...d, [id]:r}));

  const getProgLevel = (exId) => progressions[exId] || 0;
  const setProgLevel = (exId, level) => {
    const next = { ...progressions, [exId]: level };
    setProgressions(next);
    DataStore.saveProgressions(next);
  };

  const finishSession = () => {
    const entry = {
      id: Date.now(),
      day: activeDay,
      date: sessionStart,
      endDate: new Date().toISOString(),
      exercises: sessionData,
      progressions: { ...progressions }, // snapshot at time of session
    };
    const h = [entry, ...history];
    setHistory(h);
    DataStore.saveSessions(h);
    DataStore.clearDraft();
    setScreen('home');
    setActiveDay(null);
    showToast('Session saved!');
  };

  // ── Export / Import ──
  const exportAll = () => {
    const blob = DataStore.exportAll();
    const b = new Blob([JSON.stringify(blob, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = `park-iron-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Backup exported!');
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const blob = JSON.parse(ev.target.result);
        DataStore.importAll(blob);
        setHistory(DataStore.getSessions());
        setProgressions(DataStore.getProgressions());
        showToast('Data restored!');
      } catch (err) {
        showToast('Import failed — invalid file');
      }
    };
    reader.readAsText(file);
    // Reset input so the same file can be re-selected
    e.target.value = '';
  };

  const clearHistory = () => {
    if (confirm('Delete all session history? Cannot be undone.')) {
      setHistory([]);
      DataStore.saveSessions([]);
      showToast('History cleared');
    }
  };

  const day = activeDay ? program.days[activeDay] : null;

  return (
    <div>
      {toast && <div className="toast">{toast}</div>}
      {pendingDraft && screen === 'home' && (
        <ResumePrompt draft={pendingDraft} program={program}
          onResume={resumeSession} onDiscard={discardDraft}/>
      )}

      {/* ──── HOME ──── */}
      {screen === 'home' && (
        <div style={{padding:'20px 16px'}} className="fade-in">
          <div style={{marginBottom:32}}>
            <h1 style={{fontSize:30,fontWeight:900,letterSpacing:-1.5,
              background:'linear-gradient(135deg,#FF6B35,#4ECDC4)',
              WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>
              PARK IRON
            </h1>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:13,fontWeight:500,marginTop:4}}>
              Minimal dose. Maximum growth.
            </p>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:28}}>
            {Object.entries(program.days).map(([k,d]) => {
              const last = history.find(h=>h.day===k);
              return (
                <button key={k} className="day-card" onClick={()=>startSession(k)}
                  style={{borderColor:`${d.color}20`}}>
                  <div className="bar" style={{background:d.color}}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{paddingLeft:8}}>
                      <h3 style={{fontSize:18,fontWeight:800}}>{d.name}</h3>
                      <p style={{color:'rgba(255,255,255,.45)',fontSize:13,fontWeight:500,marginTop:4}}>
                        {d.subtitle}
                      </p>
                      {last && <p style={{color:'rgba(255,255,255,.2)',fontSize:11,marginTop:8}}>
                        Last: {fmtDate(last.date)}</p>}
                    </div>
                    <div style={{width:48,height:48,borderRadius:14,background:`${d.color}15`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:24,fontWeight:900,color:d.color,flexShrink:0}}>
                      {k}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>

          <button onClick={()=>setScreen('history')} className="day-card"
            style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px'}}>
            <div>
              <span style={{fontSize:15,fontWeight:700}}>Session History</span>
              <span style={{color:'rgba(255,255,255,.3)',fontSize:13,marginLeft:8}}>
                {history.length} session{history.length!==1?'s':''}
              </span>
            </div>
            <span style={{color:'rgba(255,255,255,.3)',fontSize:18}}>→</span>
          </button>
        </div>
      )}

      {/* ──── SESSION ──── */}
      {screen === 'session' && day && (
        <div style={{padding:'16px'}} className="fade-in">
          <div className="sticky-hdr">
            <button className="btn-icon" onClick={() => {
              if (confirm('End session without saving?')) { setScreen('home'); }
            }}>←</button>
            <div>
              <h2 style={{fontSize:20,fontWeight:800,color:day.color}}>{day.name}</h2>
              <p style={{color:'rgba(255,255,255,.35)',fontSize:12}}>{day.subtitle}</p>
            </div>
          </div>

          {day.sections.map((sec,si) => (
            <div key={si} className="fade-in" style={{marginBottom:28,animationDelay:`${si*80}ms`}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,marginTop:si?0:16}}>
                <span className="sec-label" style={{color:day.color}}>{sec.label}</span>
                <span className="sec-meta">
                  {sec.rounds} rounds · {sec.type==='superset'?'superset':'straight sets'}
                </span>
              </div>

              {sec.exercises.map(ex => (
                <div key={ex.id} style={{marginBottom:12}}>
                  <ExerciseCard exercise={ex} totalRounds={sec.rounds}
                    reps={getReps(ex.id,sec.rounds)} onRepsChange={r=>setReps(ex.id,r)}
                    dayColor={day.color}
                    progressionLevel={getProgLevel(ex.id)}
                    onProgressionChange={lvl=>setProgLevel(ex.id,lvl)}/>
                </div>
              ))}

              <RestTimer duration={sec.rest}/>
            </div>
          ))}

          {/* RIR reminder */}
          <div style={{background:'rgba(78,205,196,.08)',borderRadius:14,padding:'14px 16px',
            border:'1px solid rgba(78,205,196,.15)',marginBottom:20}}>
            <p style={{fontSize:13,color:'#4ECDC4',fontWeight:600,lineHeight:1.5}}>
              💡 Stop when you could do 1-2 more ugly reps. Go all-out only on the <strong>last set</strong> of each exercise.
            </p>
          </div>

          <button onClick={finishSession} className="btn-primary"
            style={{background:`linear-gradient(135deg,${day.color},${day.color}aa)`,marginBottom:20}}>
            FINISH & SAVE SESSION ✓
          </button>
        </div>
      )}

      {/* ──── HISTORY ──── */}
      {screen === 'history' && (
        <div style={{padding:'16px'}} className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
            <button className="btn-icon" onClick={()=>setScreen('home')}>←</button>
            <h2 style={{fontSize:20,fontWeight:800}}>History</h2>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:20}}>
            <button onClick={exportAll} className="btn-sm" style={{flex:1,padding:12,borderRadius:12,
              border:'1px solid rgba(78,205,196,.3)',background:'rgba(78,205,196,.08)',color:'#4ECDC4',fontSize:13}}>
              ⬇ Export
            </button>
            <button onClick={() => importRef.current?.click()} className="btn-sm" style={{flex:1,padding:12,borderRadius:12,
              border:'1px solid rgba(78,205,196,.3)',background:'rgba(78,205,196,.08)',color:'#4ECDC4',fontSize:13}}>
              ⬆ Import
            </button>
            <input ref={importRef} type="file" accept=".json" onChange={handleImport}
              style={{display:'none'}}/>
            <button onClick={clearHistory} className="btn-sm" style={{padding:'12px 16px',borderRadius:12,
              border:'1px solid rgba(255,80,80,.2)',background:'rgba(255,80,80,.06)',color:'#ff5050',fontSize:13}}>
              Clear
            </button>
          </div>

          {history.length === 0 ? (
            <div style={{textAlign:'center',marginTop:60}}>
              <p style={{fontSize:32,marginBottom:8}}>🏋️</p>
              <p style={{color:'rgba(255,255,255,.3)',fontSize:14}}>No sessions yet. Go train!</p>
            </div>
          ) : history.map(entry => {
            const d = program.days[entry.day];
            if (!d) return null;
            const totalReps = Object.values(entry.exercises).reduce((a,r)=>a+r.reduce((b,v)=>b+v,0),0);
            const dur = entry.endDate ? Math.round((new Date(entry.endDate)-new Date(entry.date))/60000) : null;
            return (
              <div key={entry.id} style={{background:'rgba(255,255,255,.03)',borderRadius:14,
                padding:'16px 18px',marginBottom:10,border:`1px solid ${d.color}15`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <div>
                    <span style={{color:d.color,fontWeight:800,fontSize:15}}>{d.name}</span>
                    <span style={{color:'rgba(255,255,255,.25)',fontSize:12,marginLeft:8}}>{fmtDate(entry.date)}</span>
                  </div>
                  {dur!=null && <span className="htag">{dur}min</span>}
                </div>
                <div style={{marginBottom:8}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700}}>{totalReps}</span>
                  <span style={{fontSize:11,color:'rgba(255,255,255,.3)',marginLeft:4}}>total reps</span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {Object.entries(entry.exercises).map(([exId,reps]) => (
                    <span key={exId} className="htag">
                      {findExerciseName(program, entry.day, exId)}: {reps.join('-')}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
